spring:
  application:
    name: servicio-inventario

server:
  port: 8080

eureka:
  client:
    httpclient:
      enabled: true          # ← usa Apache HttpClient (evita el error de TransportClientFactories)
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true  # opcional: registra la IP en lugar del hostname